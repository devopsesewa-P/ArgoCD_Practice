apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox
spec:
  replicas: 3
  selector:
    matchLabels:
      app: busybox
  template:
    metadata:
      labels:
        app: busybox
    spec: 
      containers:
      - name: busybox
        image: busybox:latest
        command: ["sh", "-c", "sleep 60"] 
        ports:
          - containerPort: 80

